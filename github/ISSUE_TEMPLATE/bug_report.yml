name: Bug report
about: Report a reproducible CryptoGotchi problem
title: "[Bug] "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: CryptoGotchi version
      placeholder: 0.7.3
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Raspberry Pi OS
      options:
        - Lite 32-bit
        - Lite 64-bit
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove tokens, passwords, Wi-Fi details and other secrets before posting.
      render: shell
