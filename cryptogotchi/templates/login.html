{% extends "base.html" %}{% block content %}
<section class="auth-card">
<div class="auth-emblem">◉‿◉</div><h1>{{ t('login.title') }}</h1>
<form method="post">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<label>{{ t('setup.user') }}<input name="username" autocomplete="username" required></label>
<label>{{ t('setup.password') }}<input name="password" type="password" autocomplete="current-password" required></label>
<button>{{ t('login.button') }}</button>
</form>
</section>
{% endblock %}
